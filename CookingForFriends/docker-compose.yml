services:
  db:
    image: postgres:16-alpine
    container_name: cff-postgres
    restart: unless-stopped
    env_file: .env.development
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cooking_for_friends}
      POSTGRES_USER: ${POSTGRES_USER:-cff}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cff_dev_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - cff_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cff} -d ${POSTGRES_DB:-cooking_for_friends}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  cff_pgdata:
