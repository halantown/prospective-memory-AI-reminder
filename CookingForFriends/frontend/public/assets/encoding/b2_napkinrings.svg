<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" width="280" height="320">
  <rect width="280" height="320" rx="12" fill="#F8F7F4"/>
  
  <!-- Four napkin rings arranged in a slight arc -->
  <!-- Ring 1 -->
  <ellipse cx="80" cy="120" rx="22" ry="30" fill="none" stroke="#C19A6B" stroke-width="6"/>
  <ellipse cx="80" cy="120" rx="22" ry="30" fill="none" stroke="#D4A76A" stroke-width="4"/>
  <!-- Wood grain -->
  <path d="M62,110 Q80,108 98,110" fill="none" stroke="#B8860B" stroke-width="0.5" opacity="0.3"/>
  <path d="M64,125 Q80,123 96,125" fill="none" stroke="#B8860B" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Ring 2 -->
  <ellipse cx="130" cy="115" rx="22" ry="30" fill="none" stroke="#C19A6B" stroke-width="6"/>
  <ellipse cx="130" cy="115" rx="22" ry="30" fill="none" stroke="#D4A76A" stroke-width="4"/>
  <path d="M112,105 Q130,103 148,105" fill="none" stroke="#B8860B" stroke-width="0.5" opacity="0.3"/>
  <path d="M114,120 Q130,118 146,120" fill="none" stroke="#B8860B" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Ring 3 -->
  <ellipse cx="180" cy="118" rx="22" ry="30" fill="none" stroke="#C19A6B" stroke-width="6"/>
  <ellipse cx="180" cy="118" rx="22" ry="30" fill="none" stroke="#D4A76A" stroke-width="4"/>
  <path d="M162,108 Q180,106 198,108" fill="none" stroke="#B8860B" stroke-width="0.5" opacity="0.3"/>
  <path d="M164,123 Q180,121 196,123" fill="none" stroke="#B8860B" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Ring 4 -->
  <ellipse cx="220" cy="125" rx="22" ry="30" fill="none" stroke="#C19A6B" stroke-width="6"/>
  <ellipse cx="220" cy="125" rx="22" ry="30" fill="none" stroke="#D4A76A" stroke-width="4"/>
  <path d="M202,115 Q220,113 238,115" fill="none" stroke="#B8860B" stroke-width="0.5" opacity="0.3"/>
  <path d="M204,130 Q220,128 236,130" fill="none" stroke="#B8860B" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Material label -->
  <text x="140" y="185" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#95A5A6" font-weight="500" letter-spacing="1">WOODEN · LIGHT OAK</text>
  
  <!-- Set of 4 indicator -->
  <text x="140" y="205" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#BDC3C7">Set of 4</text>
  
  <!-- Label -->
  <text x="140" y="252" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#2C3E50" font-weight="600">Wooden rings — Light oak</text>
  <text x="140" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#7F8C8D">Napkin rings · Wardrobe top drawer</text>
  <text x="140" y="292" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#BDC3C7">Bedroom</text>
</svg>