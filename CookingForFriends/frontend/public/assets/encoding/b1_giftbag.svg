<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" width="280" height="320">
  <rect width="280" height="320" rx="12" fill="#F8F7F4"/>
  
  <!-- Bag body (small, trapezoid) -->
  <path d="M105,215 L95,100 L185,100 L175,215 Z" fill="#5DADE2" stroke="#2E86C1" stroke-width="0.8"/>
  
  <!-- Bag fold/crease -->
  <line x1="115" y1="100" x2="110" y2="215" stroke="#3498DB" stroke-width="0.5" opacity="0.4"/>
  <line x1="165" y1="100" x2="170" y2="215" stroke="#3498DB" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Handles -->
  <path d="M118,100 Q118,82 140,82 Q162,82 162,100" fill="none" stroke="#2471A3" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Bow decoration -->
  <ellipse cx="130" cy="95" rx="14" ry="8" fill="#E74C3C" opacity="0.9"/>
  <ellipse cx="150" cy="95" rx="14" ry="8" fill="#E74C3C" opacity="0.9"/>
  <circle cx="140" cy="95" r="5" fill="#C0392B"/>
  <!-- Ribbon tails -->
  <path d="M135,100 L125,120" stroke="#C0392B" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M145,100 L155,120" stroke="#C0392B" stroke-width="2" stroke-linecap="round" fill="none"/>
  
  <!-- Size indicator -->
  <text x="140" y="62" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#95A5A6" font-weight="500" letter-spacing="2">SMALL</text>
  <!-- Size arrows -->
  <line x1="90" y1="95" x2="90" y2="218" stroke="#BDC3C7" stroke-width="0.8" marker-start="url(#arrowUp)" marker-end="url(#arrowDown)"/>
  <defs>
    <marker id="arrowUp" viewBox="0 0 6 6" refX="3" refY="0" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M0,6 L3,0 L6,6" fill="none" stroke="#BDC3C7" stroke-width="1"/>
    </marker>
    <marker id="arrowDown" viewBox="0 0 6 6" refX="3" refY="6" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M0,0 L3,6 L6,0" fill="none" stroke="#BDC3C7" stroke-width="1"/>
    </marker>
  </defs>
  
  <!-- Label -->
  <text x="140" y="250" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#2C3E50" font-weight="600">Small blue bag — Bow</text>
  <text x="140" y="270" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#7F8C8D">Gift bag · On the dresser</text>
  <text x="140" y="290" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#BDC3C7">Bedroom</text>
</svg>