<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" width="280" height="320">
  <rect width="280" height="320" rx="12" fill="#F8F7F4"/>
  
  <!-- Vase body -->
  <path d="M115,210 Q105,180 108,140 Q112,105 125,85 L155,85 Q168,105 172,140 Q175,180 165,210 Z" 
        fill="#5DADE2" stroke="#2E86C1" stroke-width="0.8"/>
  
  <!-- Glaze shine -->
  <path d="M118,155 Q122,130 128,100" fill="none" stroke="white" stroke-width="2.5" opacity="0.35" stroke-linecap="round"/>
  <path d="M125,165 Q127,150 130,130" fill="none" stroke="white" stroke-width="1.2" opacity="0.2" stroke-linecap="round"/>
  
  <!-- Rim -->
  <ellipse cx="140" cy="85" rx="17" ry="6" fill="#3498DB" stroke="#2E86C1" stroke-width="0.8"/>
  <ellipse cx="140" cy="83" rx="13" ry="4" fill="#2980B9"/>
  
  <!-- Base -->
  <rect x="122" y="208" width="36" height="6" rx="3" fill="#2E86C1"/>
  
  <!-- Size indicator -->
  <line x1="85" y1="85" x2="85" y2="214" stroke="#BDC3C7" stroke-width="0.8"/>
  <line x1="82" y1="85" x2="88" y2="85" stroke="#BDC3C7" stroke-width="0.8"/>
  <line x1="82" y1="214" x2="88" y2="214" stroke="#BDC3C7" stroke-width="0.8"/>
  <text x="80" y="155" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#95A5A6" transform="rotate(-90 80 155)">SMALL</text>
  
  <!-- Color label -->
  <text x="140" y="55" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#2E86C1" font-weight="500" letter-spacing="1">BLUE GLAZE</text>
  
  <!-- Label -->
  <text x="140" y="252" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#2C3E50" font-weight="600">Small vase — Blue glaze</text>
  <text x="140" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#7F8C8D">Ceramic · Windowsill</text>
  <text x="140" y="292" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#BDC3C7">Bedroom</text>
</svg>