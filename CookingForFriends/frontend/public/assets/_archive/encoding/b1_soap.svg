<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" width="280" height="320">
  <rect width="280" height="320" rx="12" fill="#F8F7F4"/>
  
  <!-- Bottle body -->
  <rect x="100" y="100" width="80" height="120" rx="10" fill="#FDFEFE" stroke="#D5D8DC" stroke-width="0.8"/>
  
  <!-- Pump mechanism -->
  <rect x="130" y="68" width="20" height="35" rx="3" fill="#BDC3C7" stroke="#95A5A6" stroke-width="0.5"/>
  <!-- Pump head -->
  <rect x="118" y="58" width="44" height="14" rx="5" fill="#ABB2B9" stroke="#95A5A6" stroke-width="0.5"/>
  <!-- Nozzle -->
  <rect x="155" y="52" width="22" height="8" rx="3" fill="#ABB2B9"/>
  <circle cx="178" cy="56" r="3" fill="#95A5A6"/>
  
  <!-- Lemon label -->
  <rect x="112" y="130" width="56" height="60" rx="4" fill="#F9E79F" stroke="#F1C40F" stroke-width="0.5"/>
  <!-- Lemon icon -->
  <ellipse cx="140" cy="152" rx="12" ry="10" fill="#F4D03F"/>
  <ellipse cx="140" cy="152" rx="9" ry="7" fill="#F9E79F" opacity="0.5"/>
  <!-- Leaf -->
  <path d="M150,145 Q156,140 153,135" fill="#27AE60" stroke="#229954" stroke-width="0.5"/>
  <!-- Label text -->
  <text x="140" y="177" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#7D6608" font-weight="600" letter-spacing="0.5">LEMON</text>
  
  <!-- Pump type indicator -->
  <text x="140" y="42" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#95A5A6" font-weight="500" letter-spacing="1">PUMP</text>
  
  <!-- Label -->
  <text x="140" y="252" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#2C3E50" font-weight="600">Pump bottle — Lemon label</text>
  <text x="140" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#7F8C8D">Hand soap · Shelf above sink</text>
  <text x="140" y="292" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#BDC3C7">Bathroom</text>
</svg>