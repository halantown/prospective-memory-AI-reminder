<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" width="280" height="320">
  <rect width="280" height="320" rx="12" fill="#F8F7F4"/>
  
  <!-- Speaker body (round, top-down view) -->
  <circle cx="140" cy="120" r="60" fill="#7F8C8D" stroke="#6C7A7D" stroke-width="0.8"/>
  
  <!-- Fabric mesh texture (crosshatch pattern) -->
  <defs>
    <pattern id="fabric" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="6" y2="6" stroke="#95A5A6" stroke-width="0.3"/>
      <line x1="6" y1="0" x2="0" y2="6" stroke="#95A5A6" stroke-width="0.3"/>
    </pattern>
    <clipPath id="speakerClip">
      <circle cx="140" cy="120" r="58"/>
    </clipPath>
  </defs>
  <circle cx="140" cy="120" r="58" fill="url(#fabric)" clip-path="url(#speakerClip)"/>
  
  <!-- Center driver visible through fabric -->
  <circle cx="140" cy="120" r="18" fill="#5D6D7E" stroke="#4D5D6D" stroke-width="0.5"/>
  <circle cx="140" cy="120" r="8" fill="#4D5D6D"/>
  <circle cx="140" cy="120" r="3" fill="#3D4D5D"/>
  
  <!-- Rim/edge -->
  <circle cx="140" cy="120" r="60" fill="none" stroke="#566573" stroke-width="2"/>
  
  <!-- Shape label -->
  <text x="140" y="60" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#95A5A6" font-weight="500" letter-spacing="1">ROUND</text>
  
  <!-- Material callout -->
  <line x1="190" y1="90" x2="225" y2="70" stroke="#BDC3C7" stroke-width="0.8"/>
  <text x="228" y="70" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#95A5A6">fabric mesh</text>
  
  <!-- Bottom base indicator -->
  <rect x="120" y="182" width="40" height="6" rx="3" fill="#566573"/>
  
  <!-- Bluetooth icon hint -->
  <text x="140" y="210" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#BDC3C7">Bluetooth</text>
  
  <!-- Label -->
  <text x="140" y="252" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#2C3E50" font-weight="600">Round speaker — Fabric cover</text>
  <text x="140" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#7F8C8D">Bluetooth · Sideboard bottom shelf</text>
  <text x="140" y="292" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#BDC3C7">Living Room</text>
</svg>