<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" width="280" height="320">
  <rect width="280" height="320" rx="12" fill="#F8F7F4"/>
  
  <!-- Dish body (oval, top-down view) -->
  <ellipse cx="140" cy="130" rx="95" ry="65" fill="#FDFEFE" stroke="#D5D8DC" stroke-width="1"/>
  <!-- Inner rim -->
  <ellipse cx="140" cy="130" rx="78" ry="52" fill="none" stroke="#E8E8E8" stroke-width="0.8"/>
  <!-- Glaze shine -->
  <ellipse cx="120" cy="110" rx="25" ry="12" fill="white" opacity="0.5" transform="rotate(-15 120 110)"/>
  
  <!-- Blue handle left -->
  <rect x="32" y="118" width="20" height="28" rx="6" fill="#3498DB" stroke="#2E86C1" stroke-width="0.8"/>
  <rect x="36" y="124" width="12" height="16" rx="4" fill="none" stroke="#2E86C1" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Blue handle right -->
  <rect x="228" y="118" width="20" height="28" rx="6" fill="#3498DB" stroke="#2E86C1" stroke-width="0.8"/>
  <rect x="232" y="124" width="12" height="16" rx="4" fill="none" stroke="#2E86C1" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Shape indicator -->
  <text x="140" y="210" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#95A5A6" font-weight="500" letter-spacing="1">OVAL</text>
  <!-- Oval outline hint -->
  <ellipse cx="140" cy="210" rx="30" ry="10" fill="none" stroke="#D5D8DC" stroke-width="0.5" stroke-dasharray="3 2"/>
  
  <!-- Label -->
  <text x="140" y="252" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#2C3E50" font-weight="600">Oval dish — Blue handles</text>
  <text x="140" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#7F8C8D">Ceramic baking dish · Bottom shelf</text>
  <text x="140" y="292" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#BDC3C7">Living Room · Display cabinet</text>
</svg>