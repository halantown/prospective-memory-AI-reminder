<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" width="280" height="320">
  <rect width="280" height="320" rx="12" fill="#F8F7F4"/>
  
  <!-- Saucer -->
  <ellipse cx="140" cy="210" rx="70" ry="16" fill="#C0846B" stroke="#A0695A" stroke-width="0.8"/>
  <ellipse cx="140" cy="207" rx="58" ry="12" fill="#D49A80"/>
  
  <!-- Pot body (trapezoid shape) -->
  <path d="M95,100 L88,200 L192,200 L185,100 Z" fill="#C0846B" stroke="#A0695A" stroke-width="0.8"/>
  
  <!-- Pot rim -->
  <ellipse cx="140" cy="100" rx="48" ry="10" fill="#D49A80" stroke="#A0695A" stroke-width="0.8"/>
  <ellipse cx="140" cy="98" rx="42" ry="7" fill="#B07660"/>
  
  <!-- Terracotta texture lines -->
  <line x1="105" y1="130" x2="175" y2="130" stroke="#A0695A" stroke-width="0.4" opacity="0.3"/>
  <line x1="100" y1="160" x2="180" y2="160" stroke="#A0695A" stroke-width="0.4" opacity="0.3"/>
  <line x1="95" y1="185" x2="185" y2="185" stroke="#A0695A" stroke-width="0.4" opacity="0.3"/>
  
  <!-- Size indicator -->
  <text x="140" y="60" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#95A5A6" font-weight="500" letter-spacing="1">MEDIUM</text>
  
  <!-- Saucer callout -->
  <line x1="212" y1="210" x2="235" y2="195" stroke="#BDC3C7" stroke-width="0.8"/>
  <text x="238" y="195" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#95A5A6">with saucer ✓</text>
  
  <!-- Label -->
  <text x="140" y="252" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#2C3E50" font-weight="600">Medium pot — With saucer</text>
  <text x="140" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#7F8C8D">Terracotta · Window shelf</text>
  <text x="140" y="292" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#BDC3C7">Living Room</text>
</svg>