<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" width="280" height="320">
  <rect width="280" height="320" rx="12" fill="#F8F7F4"/>
  
  <!-- Bottle body -->
  <rect x="95" y="80" width="90" height="140" rx="12" fill="#8E44AD" stroke="#7D3C98" stroke-width="0.8"/>
  
  <!-- Bottle neck -->
  <rect x="118" y="55" width="44" height="30" rx="4" fill="#8E44AD" stroke="#7D3C98" stroke-width="0.8"/>
  
  <!-- Cap -->
  <rect x="115" y="42" width="50" height="18" rx="6" fill="#9B59B6" stroke="#8E44AD" stroke-width="0.5"/>
  
  <!-- Lavender label -->
  <rect x="107" y="110" width="66" height="80" rx="4" fill="#E8DAEF" stroke="#D2B4DE" stroke-width="0.5"/>
  
  <!-- Lavender sprig illustration -->
  <!-- Stem -->
  <line x1="140" y1="170" x2="140" y2="125" stroke="#27AE60" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lavender buds (small ovals along stem) -->
  <ellipse cx="140" cy="128" rx="4" ry="3" fill="#8E44AD"/>
  <ellipse cx="137" cy="134" rx="4" ry="3" fill="#9B59B6"/>
  <ellipse cx="143" cy="134" rx="4" ry="3" fill="#9B59B6"/>
  <ellipse cx="136" cy="140" rx="4" ry="3" fill="#AF7AC5"/>
  <ellipse cx="144" cy="140" rx="4" ry="3" fill="#AF7AC5"/>
  <ellipse cx="137" cy="146" rx="3.5" ry="2.5" fill="#BB8FCE"/>
  <ellipse cx="143" cy="146" rx="3.5" ry="2.5" fill="#BB8FCE"/>
  <!-- Small leaves -->
  <path d="M140,155 Q132,150 135,145" fill="#229954" stroke="none"/>
  <path d="M140,155 Q148,150 145,145" fill="#229954" stroke="none"/>
  
  <!-- Label text -->
  <text x="140" y="182" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="7.5" fill="#6C3483" font-weight="600" letter-spacing="0.5">LAVENDER</text>
  
  <!-- Bottle color label -->
  <text x="140" y="37" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#95A5A6" font-weight="500" letter-spacing="1">PURPLE</text>
  
  <!-- Label -->
  <text x="140" y="252" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#2C3E50" font-weight="600">Purple bottle — Lavender</text>
  <text x="140" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#7F8C8D">Fabric softener · Shelf above machine</text>
  <text x="140" y="292" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#BDC3C7">Bathroom</text>
</svg>