version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: saturday_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-saturday_root_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-experiment}
      MYSQL_USER: ${MYSQL_USER:-saturday}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-saturday_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-saturday_root_pass}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
