# ═══════════════════════════════════════════════════════════════════════
# Saturday At Home — Game Configuration
# ═══════════════════════════════════════════════════════════════════════
# All tunable experiment parameters in one place.
# Edit here or via the web UI at /config.
# Backend reads this on startup; changes via /config API are saved back.
# ═══════════════════════════════════════════════════════════════════════

# ── Steak Cooking ─────────────────────────────────────────────────────
steak:
  # Per-hob base cooking time (ms) — staggered to prevent sync
  hob_base_cooking_ms: [11000, 13000, 15000]
  # Random jitter added to each respawn (ms)
  cooking_jitter_ms: 1000
  ready_ms: 4000
  # Ash mechanic: BURNING countdown before auto-clear
  ash_countdown_ms: 9000
  # Respawn delay after serve/clean (ms range)
  respawn_min_ms: 8000
  respawn_max_ms: 15000

# ── Scoring ───────────────────────────────────────────────────────────
scoring:
  steak_pepper: 2
  steak_serve: 5
  steak_burn_penalty: -10
  steak_ash_penalty: -20
  message_correct: 3
  message_wrong: -2
  message_expire_penalty: -2
  plant_water_fresh: 3
  plant_water_wilted: 1
  laundry_correct: 3
  laundry_wrong: -2
  laundry_jam_miss: -5

# ── Timers (ms) ──────────────────────────────────────────────────────
timers:
  message_timeout_ms: 30000
  plant_wilt_ms: 30000
  game_tick_ms: 1000
  hob_check_ms: 500
  laundry_wash_min_ms: 45000
  laundry_wash_max_ms: 90000
  laundry_jam_fix_ms: 15000

# ── Laundry ──────────────────────────────────────────────────────────
laundry:
  jam_probability: 0.4
  garment_pool:
    - { color: "red",    category: "warm",  label: "Red T-Shirt" }
    - { color: "orange", category: "warm",  label: "Orange Scarf" }
    - { color: "yellow", category: "warm",  label: "Yellow Dress" }
    - { color: "blue",   category: "cold",  label: "Blue Jeans" }
    - { color: "green",  category: "cold",  label: "Green Hoodie" }
    - { color: "purple", category: "cold",  label: "Purple Socks" }
    - { color: "white",  category: "white", label: "White Shirt" }
    - { color: "gray",   category: "white", label: "Gray Towel" }
  rules:
    warm:  { detergent: "Warm Detergent",  temp: "40°" }
    cold:  { detergent: "Cold Detergent",  temp: "30°" }
    white: { detergent: "White Detergent", temp: "60°" }

# ── Timeline (seconds) ──────────────────────────────────────────────
timeline:
  block_duration_s: 510

  steak_spawn:
    start_s: 3
    end_s: 490
    interval_min_s: 8
    interval_max_s: 15

  plant_water:
    start_s: 45
    start_jitter_s: 15
    interval_min_s: 40
    interval_max_s: 60

  events:
    fake_trigger_s: 35
    robot_neutral_1_s: 75
    force_yellow_1_s: 95
    force_yellow_1_hob: 0
    reminder_a_s: 120
    trigger_a_appear_s: 210
    trigger_a_close_s: 240
    robot_neutral_2_s: 270
    force_yellow_2_s: 275
    force_yellow_2_hob: 1
    reminder_b_s: 300
    trigger_b_appear_s: 390
    trigger_b_close_s: 420

  neutral_comments:
    - "Smells great in the kitchen!"
    - "How's everything coming along?"

  messages:
    - time_s: 55
      from: "Sarah"
      subject: "Tonight's party"
      body: "Hey! I'm buying snacks — 3 packs of chips at $4 each. How much should I bring?"
      options: ["$10", "$12", "$15"]
      correct: 1
      avatar: "S"
    - time_s: 130
      from: "FoodDash"
      subject: "Delivery issue"
      body: "Your building has 3 entrances. You're in unit 7B on the east side. Which entrance is closest?"
      options: ["North entrance", "East entrance", "South entrance"]
      correct: 1
      avatar: "🛵"
    - time_s: 220
      from: "David"
      subject: "Parking question"
      body: "The parking garage has spots A1-A20 on level 1, B1-B20 on level 2. Your spot is B12. Which level do I go to?"
      options: ["Level 1", "Level 2", "Level 3"]
      correct: 1
      avatar: "D"
    - time_s: 310
      from: "Building Mgmt"
      subject: "Water shutoff notice"
      body: "Water will be shut off tomorrow from 9am-12pm for maintenance. When does it end?"
      options: ["11am", "12pm", "1pm"]
      correct: 1
      avatar: "📦"
    - time_s: 400
      from: "Sarah"
      subject: "Dessert math"
      body: "There'll be 8 people at dinner. Each slice of cake serves 1. A cake has 6 slices. How many cakes do we need?"
      options: ["1 cake", "2 cakes", "3 cakes"]
      correct: 1
      avatar: "S"

# ── Experiment Design ────────────────────────────────────────────────
experiment:
  latin_square:
    A: ["LowAF_LowCB", "HighAF_LowCB", "LowAF_HighCB", "HighAF_HighCB"]
    B: ["HighAF_LowCB", "LowAF_HighCB", "HighAF_HighCB", "LowAF_LowCB"]
    C: ["LowAF_HighCB", "HighAF_HighCB", "LowAF_LowCB", "HighAF_LowCB"]
    D: ["HighAF_HighCB", "LowAF_LowCB", "HighAF_LowCB", "LowAF_HighCB"]

  task_pairs:
    1: ["medicine_a", "medicine_b"]
    2: ["laundry_c", "laundry_d"]
    3: ["comm_e", "comm_f"]
    4: ["chores_g", "chores_h"]

  reminder_texts:
    LowAF_LowCB: "By the way, remember — after dinner today, take your medicine."
    HighAF_LowCB: "By the way, remember — after dinner today, take your Doxycycline from the red round bottle, the one your cardiologist prescribed."
    LowAF_HighCB: "I can see you're keeping an eye on the stove. By the way — after dinner today, remember to take your medicine."
    HighAF_HighCB: "I can see you're keeping an eye on the stove. By the way — after dinner today, take your Doxycycline from the red round bottle, the one your cardiologist prescribed."

  fake_trigger_type: "delivery"
  execution_window_ms: 30000

# ── PM Tasks ─────────────────────────────────────────────────────────
pm_tasks:
  medicine_a:
    prompt: "Take your prescribed medicine"
    bottles:
      - id: "round_red"
        label: "Red round bottle"
        shape: "round"
        color: "#e57373"
      - id: "square_red"
        label: "Red square bottle"
        shape: "square"
        color: "#ef5350"
    amounts: ["1 tablet", "2 tablets", "3 tablets"]
    correct:
      bottle: "round_red"
      amount: "2 tablets"

  medicine_b:
    prompt: "Take your vitamin supplement"
    bottles:
      - id: "round_orange"
        label: "Orange round bottle"
        shape: "round"
        color: "#ffb74d"
      - id: "square_orange"
        label: "Orange square bottle"
        shape: "square"
        color: "#ffa726"
    amounts: ["500mg × 1", "500mg × 2", "1000mg × 1"]
    correct:
      bottle: "round_orange"
      amount: "1000mg × 1"

  chores_g:
    type: "pressure_cooker"
    prompt: "The pressure cooker is ready — handle it safely"
    steps:
      - id: "release_steam"
        label: "Turn valve to release steam"
        required: false
      - id: "open_lid"
        label: "Open the lid"
        required: true
    correct:
      action: "release_steam_open_lid"

# ── Trigger Icons ────────────────────────────────────────────────────
trigger_icons:
  medicine_a: { icon: "🍽️", label: "Dinner ready" }
  medicine_b: { icon: "☕", label: "Coffee done" }
  laundry_c:  { icon: "👕", label: "Laundry done" }
  laundry_d:  { icon: "🌅", label: "Getting dark" }
  comm_e:     { icon: "📱", label: "Friend online" }
  comm_f:     { icon: "🚪", label: "Doorbell" }
  chores_g:   { icon: "🍲", label: "Slow cooker" }
  chores_h:   { icon: "🗑️", label: "Rubbish truck" }

# ── Audio ────────────────────────────────────────────────────────────
audio:
  bgm_normal_volume: 0.35
  bgm_ducked_volume: 0.08
  duck_in_ms: 300
  duck_out_ms: 800
  tts_lang: "en-US"
  tts_rate: 0.9
  tts_pitch: 1.0
