# Saturday At Home — PRD v2.0 State-Driven Configuration
# Single source of truth for experiment logic, timeline, and PM tasks.

timeline:
  block_duration_s: 510
  events:
    reminder_a_s: 120
    trigger_a_appear_s: 210
    trigger_a_close_s: 240
    reminder_b_s: 300
    trigger_b_appear_s: 390
    trigger_b_close_s: 420
    neutral_comment_1_s: 30
    neutral_comment_2_s: 255
    neutral_comment_3_s: 450

  block_room_schedule:
    1:
      - t: 0
        room: kitchen
        activity: recipe_following
        narrative: "Start lunch prep in the kitchen."
      - t: 75
        room: living_room
        activity: message_processing
        narrative: "Move to the living room to handle messages."
      - t: 270
        room: kitchen
        activity: cooking_monitor
        narrative: "Back to the kitchen for a quick cooking check."
      - t: 450
        room: entrance
        activity: item_management
        narrative: "Head to the entrance for final house prep."

    2:
      - t: 0
        room: living_room
        activity: sorting
        narrative: "Start in the living room by organizing items."
      - t: 75
        room: balcony
        activity: household_checks
        narrative: "Go to the balcony for home checks."
      - t: 270
        room: living_room
        activity: message_processing
        narrative: "Return to the living room for incoming messages."
      - t: 450
        room: entrance
        activity: item_management
        narrative: "Wrap up at the entrance area."

    3:
      - t: 0
        room: kitchen
        activity: recipe_following
        narrative: "Begin in the kitchen with the next recipe sequence."
      - t: 75
        room: entrance
        activity: item_management
        narrative: "Move to the entrance to prepare outgoing items."
      - t: 270
        room: kitchen
        activity: cooking_monitor
        narrative: "Return to the kitchen for another cooking check."
      - t: 450
        room: balcony
        activity: household_checks
        narrative: "Finish with quick balcony checks."

    4:
      - t: 0
        room: living_room
        activity: message_processing
        narrative: "Start in the living room and catch up on messages."
      - t: 75
        room: entrance
        activity: item_management
        narrative: "Go to the entrance to organize delivery items."
      - t: 270
        room: living_room
        activity: sorting
        narrative: "Return to the living room to complete sorting."
      - t: 450
        room: kitchen
        activity: recipe_following
        narrative: "Wind down in the kitchen."

  neutral_comments:
    - "Looks like a nice day for getting things done."
    - "You are keeping a steady pace."
    - "Everything seems on track so far."

experiment:
  latin_square:
    A: ["LowAF_LowCB", "HighAF_LowCB", "LowAF_HighCB", "HighAF_HighCB"]
    B: ["HighAF_LowCB", "LowAF_HighCB", "HighAF_HighCB", "LowAF_LowCB"]
    C: ["LowAF_HighCB", "HighAF_HighCB", "LowAF_LowCB", "HighAF_LowCB"]
    D: ["HighAF_HighCB", "LowAF_LowCB", "HighAF_LowCB", "LowAF_HighCB"]

  block_task_slots:
    1: { A: medicine,  B: tea }
    2: { A: laundry,   B: book }
    3: { A: pot,       B: umbrella }
    4: { A: tv_record, B: coat }

  execution_window_ms: 30000

  condition_rules:
    LowAF_LowCB:
      af_level: low
      cb_level: low
      include_context_preamble: false
      reminder_word_limit: 15
      preamble_word_limit: 0
    HighAF_LowCB:
      af_level: high
      cb_level: low
      include_context_preamble: false
      reminder_word_limit: 35
      preamble_word_limit: 0
    LowAF_HighCB:
      af_level: low
      cb_level: high
      include_context_preamble: true
      reminder_word_limit: 15
      preamble_word_limit: 12
    HighAF_HighCB:
      af_level: high
      cb_level: high
      include_context_preamble: true
      reminder_word_limit: 35
      preamble_word_limit: 12

rooms:
  kitchen:
    label: Kitchen
    activity_templates:
      recipe_following:
        label: Recipe following
        prompts:
          - instruction: "The recipe says to add olive oil first."
            options: ["Olive oil", "Sesame oil", "Vinegar"]
            correct_index: 0
          - instruction: "Choose the ingredient for step 2."
            options: ["Garlic", "Sugar", "Cinnamon"]
            correct_index: 0
      cooking_monitor:
        label: Cooking monitoring
        prompts:
          - instruction: "Give the pan a quick stir."
            options: ["Stir now", "Skip"]
            correct_index: 0
  living_room:
    label: Living Room
    activity_templates:
      message_processing:
        label: Message processing
        prompts:
          - instruction: "Friend asks: wine or dessert?"
            options: ["Wine", "Dessert"]
            correct_index: 1
          - instruction: "Friend asks: 6pm or 7pm?"
            options: ["6pm", "7pm"]
            correct_index: 0
      sorting:
        label: Sorting and organizing
        prompts:
          - instruction: "Sort this photo into the travel album."
            options: ["Travel", "Bills", "Work"]
            correct_index: 0
  balcony:
    label: Balcony
    activity_templates:
      household_checks:
        label: Household checks
        prompts:
          - instruction: "Plant soil looks dry. What do you do?"
            options: ["Water", "Skip"]
            correct_index: 0
          - instruction: "Laundry item feels damp."
            options: ["Leave it", "Fold now"]
            correct_index: 0
  entrance:
    label: Entrance
    activity_templates:
      item_management:
        label: Item management
        prompts:
          - instruction: "Delivery list says 3 items. Which one is missing?"
            options: ["Milk", "Bread", "Napkins"]
            correct_index: 2
          - instruction: "Place shoes by category."
            options: ["Indoor / Outdoor", "By color"]
            correct_index: 0

pm_tasks:
  medicine:
    title: "Take prescription medicine"
    room: kitchen
    trigger: "Dinner is ready"
    preparation_step: "Pour a glass of water first"
    target:
      id: doxycycline_red_round_left
      label: "Red round bottle (Doxycycline), left side"
      cues: ["red", "round", "left side"]
    distractor:
      id: ibuprofen_red_square_right
      label: "Red square bottle (Ibuprofen), right side"
      cues: ["red", "square", "right side"]
    steps:
      - { id: prepare_water, label: "Pour water", required: true }
      - { id: take_tablet, label: "Take one tablet", required: true }
    low_af_text: "Remember to take your medicine later today."
    high_af_text: "After dinner, find the red round Doxycycline bottle on the left side. Pour water first, then take one tablet."
    encoding_card:
      instruction: "When dinner is ready, go to the kitchen, pick the correct bottle, pour water, then take one tablet."
      quiz:
        question: "Which bottle is correct?"
        options: ["Red round left bottle", "Red square right bottle"]
        correct_index: 0

  tea:
    title: "Prepare specific tea"
    room: kitchen
    trigger: "Friend says they are 10 minutes away"
    preparation_step: "Boil water first"
    target:
      id: longjing_green_tin_top
      label: "Longjing green tin, top shelf"
      cues: ["green tin", "top shelf", "Longjing"]
    distractor:
      id: biluochun_green_tin_bottom
      label: "Biluochun green tin, bottom shelf"
      cues: ["green tin", "bottom shelf", "Biluochun"]
    steps:
      - { id: boil_water, label: "Boil water", required: true }
      - { id: steep_tea, label: "Steep tea", required: true }
    low_af_text: "Remember to make tea for your friend."
    high_af_text: "Use the Longjing green tin on the top shelf. Boil water first, then steep the tea."
    encoding_card:
      instruction: "When your friend is 10 minutes away, go to the kitchen, choose the right tea tin, boil water, then steep tea."
      quiz:
        question: "Which tin is correct?"
        options: ["Top shelf Longjing", "Bottom shelf Biluochun"]
        correct_index: 0

  laundry:
    title: "Collect specific laundry"
    room: balcony
    trigger: "Weather app says clouds are coming"
    preparation_step: "Check if the shirt is dry"
    target:
      id: blue_striped_shirt_left
      label: "Blue striped shirt, left rack"
      cues: ["blue", "striped", "left rack"]
    distractor:
      id: blue_checkered_shirt_right
      label: "Blue checkered shirt, right rack"
      cues: ["blue", "checkered", "right rack"]
    steps:
      - { id: inspect_dryness, label: "Check if dry", required: true }
      - { id: fold_into_basket, label: "Fold into basket", required: true }
    low_af_text: "Remember to collect laundry from the balcony."
    high_af_text: "Collect the blue striped shirt on the left rack. Check dryness first, then fold it into the basket."
    encoding_card:
      instruction: "When the weather turns cloudy, go to the balcony, pick the correct shirt, check dryness, and fold it."
      quiz:
        question: "Which shirt is correct?"
        options: ["Blue striped left shirt", "Blue checkered right shirt"]
        correct_index: 0

  book:
    title: "Give specific book to friend"
    room: living_room
    trigger: "Friend mentions the trip you discussed"
    preparation_step: "Open the book to verify title"
    target:
      id: red_book_mountain_left
      label: "Red book with mountain cover, second shelf left"
      cues: ["red", "mountain cover", "second shelf left"]
    distractor:
      id: red_book_volcano_right
      label: "Red book with volcano cover, second shelf right"
      cues: ["red", "volcano cover", "second shelf right"]
    steps:
      - { id: verify_title, label: "Open and verify title", required: true }
      - { id: place_on_table, label: "Place on table", required: true }
    low_af_text: "Remember to find a book for your friend."
    high_af_text: "Find the red book with the mountain cover on the second shelf left. Verify title first, then place it on the table."
    encoding_card:
      instruction: "When your friend mentions the trip, go to the living room, choose the right red book, verify it, and place it on the table."
      quiz:
        question: "Which book is correct?"
        options: ["Mountain cover on left", "Volcano cover on right"]
        correct_index: 0

  pot:
    title: "Turn off pressure cooker"
    room: kitchen
    trigger: "Kitchen timer beeps"
    preparation_step: "Release valve first"
    target:
      id: silver_handle_left_burner
      label: "Silver-handle pot on left burner"
      cues: ["silver handle", "left burner"]
    distractor:
      id: black_handle_right_burner
      label: "Black-handle pot on right burner"
      cues: ["black handle", "right burner"]
    steps:
      - { id: release_valve, label: "Release pressure valve", required: true }
      - { id: open_lid, label: "Lift lid", required: true }
    low_af_text: "Remember to deal with the pot on the stove."
    high_af_text: "Handle the silver-handle pot on the left burner. Release the valve first, then open the lid."
    encoding_card:
      instruction: "When the kitchen timer beeps, go to the kitchen, choose the correct pot, release valve, then open lid."
      quiz:
        question: "Which pot is correct?"
        options: ["Silver handle left burner", "Black handle right burner"]
        correct_index: 0

  umbrella:
    title: "Put out correct umbrella"
    room: entrance
    trigger: "TV weather says rain tomorrow"
    preparation_step: "Open it to check damage"
    target:
      id: blue_folding_umbrella
      label: "Blue folding umbrella"
      cues: ["blue", "folding"]
    distractor:
      id: blue_long_umbrella
      label: "Blue long umbrella"
      cues: ["blue", "long"]
    steps:
      - { id: inspect_umbrella, label: "Open and inspect", required: true }
      - { id: place_by_door, label: "Place by door", required: true }
    low_af_text: "Remember to put out an umbrella for your friend."
    high_af_text: "Use the blue folding umbrella. Open it to inspect first, then place it by the door."
    encoding_card:
      instruction: "When rain is forecast, go to the entrance, choose the correct umbrella, inspect it, and place it by the door."
      quiz:
        question: "Which umbrella is correct?"
        options: ["Blue folding umbrella", "Blue long umbrella"]
        correct_index: 0

  tv_record:
    title: "Set TV recording"
    room: living_room
    trigger: "Clock chimes for afternoon shows"
    preparation_step: "Switch to the correct channel first"
    target:
      id: channel5_blue_planet
      label: "Channel 5 documentary Blue Planet"
      cues: ["channel 5", "Blue Planet"]
    distractor:
      id: channel3_interstellar
      label: "Channel 3 movie Interstellar"
      cues: ["channel 3", "Interstellar"]
    steps:
      - { id: switch_channel, label: "Switch to Channel 5", required: true }
      - { id: press_record, label: "Press record", required: true }
    low_af_text: "Remember to record a TV show for your mum."
    high_af_text: "Record Blue Planet on Channel 5. Switch to Channel 5 first, then press record."
    encoding_card:
      instruction: "When afternoon shows start, go to the living room, select Channel 5 Blue Planet, then record it."
      quiz:
        question: "Which channel is correct?"
        options: ["Channel 5", "Channel 3"]
        correct_index: 0

  coat:
    title: "Give correct coat to friend"
    room: entrance
    trigger: "Friend says they are leaving"
    preparation_step: "Check pockets for keys first"
    target:
      id: grey_thin_jacket_left_hook
      label: "Grey thin jacket on left hook"
      cues: ["grey", "thin", "left hook"]
    distractor:
      id: grey_thick_jacket_right_hook
      label: "Grey thick jacket on right hook"
      cues: ["grey", "thick", "right hook"]
    steps:
      - { id: check_pockets, label: "Check pockets", required: true }
      - { id: hand_to_friend, label: "Hand to friend", required: true }
    low_af_text: "Remember to get a coat for your friend."
    high_af_text: "Use the thin grey jacket on the left hook. Check the pockets first, then hand it over."
    encoding_card:
      instruction: "When your friend is leaving, go to the entrance, choose the correct grey coat, check pockets, and hand it over."
      quiz:
        question: "Which coat is correct?"
        options: ["Thin grey coat on left", "Thick grey coat on right"]
        correct_index: 0

audio:
  tts_lang: "en-US"
  tts_rate: 0.9
  tts_pitch: 1.0
