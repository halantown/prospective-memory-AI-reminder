# Saturday At Home — Game Configuration (PRD v2.1)

# Block timeline (seconds relative to block start)
timeline:
  block_duration_s: 510
  
  game_a:
    start_s: 0
    end_s: 180
    type: semantic_cat
    
  transition_ab:
    start_s: 180
    end_s: 210
    
  game_b:
    start_s: 210
    end_s: 390
    type: go_nogo
    
  transition_bc:
    start_s: 390
    end_s: 420
    
  game_c:
    start_s: 420
    end_s: 480
    type: trivia
    
  block_end_s: 510
  
  # PM events (fixed times)
  pm_slot_a:
    reminder_s: 60
    trigger_s: 150
    window_close_s: 180
    
  pm_slot_b:
    reminder_s: 270
    trigger_s: 360
    window_close_s: 390

  # Robot neutral comments (floating, jittered)
  neutral_comments:
    - base_s: 30
      jitter_s: 5
    - base_s: 300
      jitter_s: 10
    - base_s: 450
      jitter_s: 10

  # Ambient sidebar events (non-PM, add noise)
  ambient_pulses:
    - base_s: 45
      jitter_s: 10
      icon: washing_machine
    - base_s: 200
      jitter_s: 15
      icon: doorbell
    - base_s: 350
      jitter_s: 15
      icon: tv_weather

# Game presentation rates
game_rates:
  semantic_cat:
    item_interval_min_ms: 3000
    item_interval_max_ms: 4000
  go_nogo:
    item_interval_min_ms: 2000
    item_interval_max_ms: 3000
  trivia:
    item_interval_min_ms: 5000
    item_interval_max_ms: 8000

# Execution window
execution_window_ms: 30000

# Block skin assignments
block_skins:
  1: { game_a: email_v1, game_b: grocery_v1, game_c: podcast_v1 }
  2: { game_a: photo_v2, game_b: laundry_v2, game_c: news_v2 }
  3: { game_a: books_v3, game_b: recycling_v3, game_c: spot_diff_v3 }
  4: { game_a: fridge_v4, game_b: wardrobe_v4, game_c: headlines_v4 }

# Room/location narrative per game segment
room_labels:
  email_v1: { room: study, time: "10:30 AM", activity: "Sorting emails" }
  grocery_v1: { room: living_room, time: "11:15 AM", activity: "Grocery shopping" }
  podcast_v1: { room: balcony, time: "12:00 PM", activity: "Listening to podcast" }

# Latin Square
experiment:
  latin_square:
    A: ["LowAF_LowCB", "HighAF_LowCB", "LowAF_HighCB", "HighAF_HighCB"]
    B: ["HighAF_LowCB", "HighAF_HighCB", "LowAF_LowCB", "LowAF_HighCB"]
    C: ["LowAF_HighCB", "LowAF_LowCB", "HighAF_HighCB", "HighAF_LowCB"]
    D: ["HighAF_HighCB", "LowAF_HighCB", "HighAF_LowCB", "LowAF_LowCB"]

# Audio
audio:
  tts_lang: en-US
  tts_rate: 0.9
  tts_pitch: 1.0
  ding_sound: /ding.mp3
