<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超市合理性判断任务</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f8fafc;
            touch-action: manipulation;
            user-select: none;
        }
        .item-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .item-card.selected {
            border-color: #ef4444; 
            background-color: #fef2f2;
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.2);
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .pop-in {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="h-screen flex flex-col justify-center items-center p-4">

    <div id="app" class="w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200 h-[90vh] flex flex-col relative">
        
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-white shrink-0 relative overflow-hidden">
            <div class="absolute -right-6 -top-6 w-32 h-32 bg-blue-500 rounded-full opacity-50"></div>
            <div class="flex items-center gap-4 relative z-10">
                <div class="bg-white/20 p-3 rounded-2xl backdrop-blur-sm">
                    <i data-lucide="shopping-cart" class="w-10 h-10 text-white"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black tracking-tight">超市大采购</h1>
                    <p class="text-blue-100 font-medium text-lg opacity-90">请帮忙检查购物篮</p>
                </div>
            </div>
        </div>

        <!-- Task Info (Context) -->
        <div class="bg-blue-50/80 p-6 border-b border-blue-100 shrink-0">
            <div class="flex items-start gap-3">
                <div class="bg-blue-100 p-2 rounded-lg mt-1">
                    <i data-lucide="clipboard-list" class="w-6 h-6 text-blue-600"></i>
                </div>
                <div>
                    <span class="text-blue-500 font-bold uppercase text-xs tracking-wider">今日任务目标</span>
                    <h2 class="text-2xl font-black text-slate-800 leading-tight mt-1">
                        {{ scenario.context }}
                    </h2>
                </div>
            </div>
        </div>

        <!-- Gameplay Area -->
        <div class="flex-grow bg-slate-50 p-6 overflow-y-auto relative">
            
            <!-- Items Grid -->
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 pb-24">
                <div v-for="(item, index) in scenario.items" :key="item.id" 
                    @click="handleItemClick(item)"
                    class="item-card bg-white p-4 rounded-2xl border-2 shadow-sm flex flex-col items-center justify-center gap-3 relative cursor-pointer group"
                    :class="[
                        selectionMode && selectedItemId === item.id ? 'selected border-red-500 ring-4 ring-red-100' : 'border-slate-200 hover:border-blue-300',
                        selectionMode ? 'hover:shadow-md' : '',
                        item.isPop ? 'pop-in' : ''
                    ]"
                    :style="{ animationDelay: index * 100 + 'ms' }"
                >
                    <!-- Icon/Emoji Placeholder -->
                    <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center text-5xl mb-1 group-hover:scale-110 transition-transform duration-300">
                        {{ item.emoji }}
                    </div>
                    <span class="text-lg font-bold text-slate-700 text-center">{{ item.name }}</span>
                    
                    <!-- Selection Indicator -->
                    <div v-if="selectionMode && selectedItemId === item.id" class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1 shadow-lg pop-in">
                        <i data-lucide="check" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>

            <!-- Overlay for Initial Wait (Optional) -->
        </div>

        <!-- Bottom Action Bar -->
        <div class="bg-white p-6 border-t border-slate-100 shrink-0 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] z-20">
            
            <!-- Default Choice Mode -->
            <div v-if="!selectionMode && !result" class="flex gap-4 h-24">
                <button @click="chooseReasonable" class="flex-1 bg-green-500 hover:bg-green-600 text-white rounded-2xl font-black text-2xl shadow-[0_6px_0_#15803d] active:shadow-none active:translate-y-[6px] transition-all flex flex-col items-center justify-center gap-1 group">
                    <i data-lucide="check-circle-2" class="w-8 h-8 mb-1 group-hover:scale-110 transition-transform"></i>
                    完全合理
                </button>
                <button @click="enterSelectionMode" class="flex-1 bg-rose-500 hover:bg-rose-600 text-white rounded-2xl font-black text-2xl shadow-[0_6px_0_#be123c] active:shadow-none active:translate-y-[6px] transition-all flex flex-col items-center justify-center gap-1 group">
                    <i data-lucide="x-circle" class="w-8 h-8 mb-1 group-hover:scale-110 transition-transform"></i>
                    不太合理...
                </button>
            </div>

            <!-- Selection Mode Prompt -->
            <div v-if="selectionMode && !result" class="flex flex-col gap-4 animate-fade-in">
                <div class="flex items-center justify-between">
                    <div class="text-rose-600 font-bold text-lg flex items-center gap-2">
                        <i data-lucide="alert-circle" class="w-6 h-6"></i>
                        请点击一样不合理的商品
                    </div>
                    <button @click="cancelSelection" class="text-slate-400 font-bold text-sm underline hover:text-slate-600">返回</button>
                </div>
                <button 
                    @click="confirmUnreasonable" 
                    :disabled="!selectedItemId"
                    class="w-full h-16 bg-rose-500 hover:bg-rose-600 disabled:bg-slate-300 disabled:text-slate-400 disabled:shadow-none disabled:translate-y-0 text-white rounded-xl font-black text-xl shadow-[0_4px_0_#be123c] active:shadow-none active:translate-y-[4px] transition-all">
                    确认选择
                </button>
            </div>

            <!-- Result Feedback -->
            <div v-if="result" class="text-center py-2 pop-in">
                <div v-if="result === 'correct'" class="flex flex-col items-center gap-3">
                    <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-2">
                        <i data-lucide="party-popper" class="w-8 h-8"></i>
                    </div>
                    <h3 class="text-2xl font-black text-green-600">判断正确！</h3>
                    <p class="text-slate-500 font-medium mb-4">{{ feedbackMessage }}</p>
                    <button @click="nextLevel" class="bg-blue-600 text-white px-8 py-4 rounded-xl font-bold shadow-lg shadow-blue-200 active:scale-95 transition-transform">
                        继续游戏
                    </button>
                </div>

                <div v-if="result === 'wrong'" class="flex flex-col items-center gap-3">
                    <div class="w-16 h-16 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mb-2">
                        <i data-lucide="frown" class="w-8 h-8"></i>
                    </div>
                    <h3 class="text-2xl font-black text-slate-700">再想一想...</h3>
                    <p class="text-slate-500 font-medium mb-4">{{ feedbackMessage }}</p>
                    <button @click="retry" class="bg-slate-200 text-slate-600 px-8 py-4 rounded-xl font-bold hover:bg-slate-300 transition-colors">
                        重试
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const { createApp, ref, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const selectionMode = ref(false);
                const selectedItemId = ref(null);
                const result = ref(null); // 'correct', 'wrong'
                const feedbackMessage = ref('');

                // Scenarios Database
                const scenarios = [
                    {
                        id: 1,
                        context: "准备做一份水果沙拉招待朋友",
                        items: [
                            { id: 101, name: "红苹果", emoji: "🍎", isReasonable: true },
                            { id: 102, name: "甜香蕉", emoji: "🍌", isReasonable: true },
                            { id: 103, name: "酸奶", emoji: "🥛", isReasonable: true },
                            { id: 104, name: "大蒜头", emoji: "🧄", isReasonable: false }, // Unreasonable
                            { id: 105, name: "大碗", emoji: "🥣", isReasonable: true },
                            { id: 106, name: "葡萄", emoji: "🍇", isReasonable: true },
                        ],
                        correctType: 'unreasonable'
                    },
                    {
                        id: 2,
                        context: "给上小学的孙子买文具",
                        items: [
                            { id: 201, name: "铅笔", emoji: "✏️", isReasonable: true },
                            { id: 202, name: "橡皮", emoji: "🧼", isReasonable: true },
                            { id: 203, name: "笔记本", emoji: "📒", isReasonable: true },
                            { id: 204, name: "尺子", emoji: "📏", isReasonable: true },
                            { id: 205, name: "啤酒", emoji: "🍺", isReasonable: false }, // Unreasonable
                            { id: 206, name: "卷笔刀", emoji: "✂️", isReasonable: true },
                        ],
                        correctType: 'unreasonable'
                    }
                ];

                const currentScenarioIndex = ref(0);
                const scenario = ref(scenarios[0]);

                // Animations
                onMounted(() => {
                    lucide.createIcons();
                    animateItems();
                });

                const animateItems = () => {
                   scenario.value.items.forEach(i => i.isPop = false);
                   setTimeout(() => {
                        scenario.value.items.forEach(i => i.isPop = true);
                   }, 50);
                };

                // User Actions
                const chooseReasonable = () => {
                    // Check if scenario actually HAS unreasonable items
                    const hasUnreasonable = scenario.value.items.some(i => !i.isReasonable);
                    if (!hasUnreasonable) {
                        result.value = 'correct';
                        feedbackMessage.value = "看起来确实都很合理！";
                    } else {
                        result.value = 'wrong';
                        feedbackMessage.value = "再仔细看看，好像混进了奇怪的东西？";
                    }
                };

                const enterSelectionMode = () => {
                    selectionMode.value = true;
                    // Auto scroll to make sure all items are visible if needed
                    nextTick(() => lucide.createIcons());
                };

                const handleItemClick = (item) => {
                    if (!selectionMode.value) return;
                    selectedItemId.value = item.id;
                };

                const confirmUnreasonable = () => {
                    if (!selectedItemId.value) return;
                    
                    const item = scenario.value.items.find(i => i.id === selectedItemId.value);
                    if (!item.isReasonable) {
                        result.value = 'correct';
                        feedbackMessage.value = `没错！${scenario.value.context} 不需要"${item.name}"。`;
                    } else {
                        result.value = 'wrong';
                        feedbackMessage.value = `"${item.name}" 在这个场景下是可能有用的。`;
                        // Shake effect logic could go here
                    }
                };

                const cancelSelection = () => {
                    selectionMode.value = false;
                    selectedItemId.value = null;
                };

                const retry = () => {
                    result.value = null;
                    selectionMode.value = false;
                    selectedItemId.value = null;
                };

                const nextLevel = () => {
                    currentScenarioIndex.value = (currentScenarioIndex.value + 1) % scenarios.length;
                    scenario.value = scenarios[currentScenarioIndex.value];
                    retry();
                    animateItems();
                    nextTick(() => lucide.createIcons());
                };

                return {
                    scenario,
                    selectionMode,
                    selectedItemId,
                    result,
                    feedbackMessage,
                    chooseReasonable,
                    enterSelectionMode,
                    handleItemClick,
                    confirmUnreasonable,
                    cancelSelection,
                    retry,
                    nextLevel
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
