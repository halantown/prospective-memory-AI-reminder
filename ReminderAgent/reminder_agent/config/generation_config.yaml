# Generation Configuration — v3 EC operationalization
#
# Condition list reduced from 4 (AF×EC) to 2 (EC only).
# Per-condition word limits replace the single min/max.

# EC conditions
ec_conditions:
  - EC_off
  - EC_on

# Variant count per condition per task
n_variants: 3                  # dev; set to 10 for production

# Retry on quality gate failure
max_retries: 3

# Per-condition word count limits
word_limits:
  EC_off:
    min: 5
    max: 12
  EC_on:
    min: 12
    max: 25

# Global fallback (used when condition not in word_limits)
min_words: 5
max_words: 45

# Duplicate detection
similarity_threshold: 0.85

# Context format for LLM user prompt
context_format: "prose"        # prose | json
