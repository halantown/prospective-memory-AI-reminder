# Condition Field Map — 2×2 AF × EC Design
#
# AF (within-subject): item-feature specificity
#   AF_low  = action_verb + entity_name only
#   AF_high = + visual cues, domain properties, location
#
# EC (between-subject): encoding context from source
#   EC_off = no source context (element2 excluded)
#   EC_on  = full element2 included (origin + creation_context)
#
# element3 (detected_activity_raw) is excluded from ALL conditions.
# The old CB variable is removed entirely.

AF_low_EC_off:
  required_fields:
    - "reminder_context.element1.action_verb"
    - "reminder_context.element1.target_entity.entity_name"
  conditional_fields: []
  excluded_fields:
    - "reminder_context.element1.target_entity.cues"
    - "reminder_context.element1.target_entity.domain_properties"
    - "reminder_context.element1.location"
    - "reminder_context.element2"
    - "reminder_context.element3"
  excluded_zones:
    - "agent_reasoning_context"
    - "placeholder"

AF_high_EC_off:
  required_fields:
    - "reminder_context.element1.action_verb"
    - "reminder_context.element1.target_entity.entity_name"
    - "reminder_context.element1.target_entity.cues.visual"
    - "reminder_context.element1.target_entity.domain_properties"
    - "reminder_context.element1.location"
  conditional_fields: []
  excluded_fields:
    - "reminder_context.element2"
    - "reminder_context.element3"
  excluded_zones:
    - "agent_reasoning_context"
    - "placeholder"

AF_low_EC_on:
  required_fields:
    - "reminder_context.element1.action_verb"
    - "reminder_context.element1.target_entity.entity_name"
    - "reminder_context.element2.origin"
    - "reminder_context.element2.creation_context"
  conditional_fields: []
  excluded_fields:
    - "reminder_context.element1.target_entity.cues"
    - "reminder_context.element1.target_entity.domain_properties"
    - "reminder_context.element1.location"
    - "reminder_context.element3"
  excluded_zones:
    - "agent_reasoning_context"
    - "placeholder"

AF_high_EC_on:
  required_fields:
    - "reminder_context.element1.action_verb"
    - "reminder_context.element1.target_entity.entity_name"
    - "reminder_context.element1.target_entity.cues.visual"
    - "reminder_context.element1.target_entity.domain_properties"
    - "reminder_context.element1.location"
    - "reminder_context.element2.origin"
    - "reminder_context.element2.creation_context"
  conditional_fields: []
  excluded_fields:
    - "reminder_context.element3"
  excluded_zones:
    - "agent_reasoning_context"
    - "placeholder"
