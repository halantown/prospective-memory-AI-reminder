# Condition Field Map — v3 EC operationalization
#
# EC (between-subject): encoding context
#   EC_off = baseline only (action_verb + target + recipient)
#   EC_on  = baseline + ec_selected_features (entity + causality)
#
# Field paths are relative to reminder_context.

EC_off:
  visible_fields:
    - "baseline.action_verb"
    - "baseline.target"
    - "baseline.recipient"

EC_on:
  visible_fields:
    - "baseline.action_verb"
    - "baseline.target"
    - "baseline.recipient"
    - "ec_selected_features.entity"
    - "ec_selected_features.causality"
