# Condition Field Map — Authoritative field whitelist per condition
# Maps each experimental group to the Task JSON fields permitted in the LLM prompt.
# This file is the single source of truth for the operationalisation.
#
# 3-group between-subjects design:
#   Group 1 (Control): No reminder — not listed here (no text generation needed).
#   Group 2 (AF_only): High Associative Fidelity, no Contextual Bridging.
#   Group 3 (AF_CB):   High Associative Fidelity + Contextual Bridging.
#   Baseline: Template-only (action + entity), no LLM generation needed.
#
# Field paths use dot notation into the Task JSON (snake_case, rooted at reminder_context).
# excluded_zones: entire top-level zones stripped before the extractor even reads fields.

Baseline:
  required_fields:
    - "reminder_context.element1.action_verb"
    - "reminder_context.element1.target_entity.entity_name"
  conditional_fields: []
  excluded_fields:
    - "reminder_context.element1.target_entity.cues"
    - "reminder_context.element1.target_entity.domain_properties"
    - "reminder_context.element1.location"
    - "reminder_context.element2"
    - "reminder_context.element3"
  excluded_zones:
    - "agent_reasoning_context"
    - "placeholder"

AF_only:
  required_fields:
    - "reminder_context.element1.action_verb"
    - "reminder_context.element1.target_entity.entity_name"
    - "reminder_context.element1.target_entity.cues.visual"
    - "reminder_context.element1.target_entity.domain_properties"
    - "reminder_context.element1.location"
  conditional_fields:
    - field: "reminder_context.element2.origin.task_creator"
      condition: "reminder_context.element2.origin.creator_is_authority == true"
  excluded_fields:
    - "reminder_context.element3"
  excluded_zones:
    - "agent_reasoning_context"
    - "placeholder"

AF_CB:
  required_fields:
    - "reminder_context.element1.action_verb"
    - "reminder_context.element1.target_entity.entity_name"
    - "reminder_context.element1.target_entity.cues.visual"
    - "reminder_context.element1.target_entity.domain_properties"
    - "reminder_context.element1.location"
    - "reminder_context.element3.detected_activity_raw"
  conditional_fields:
    - field: "reminder_context.element2.origin.task_creator"
      condition: "reminder_context.element2.origin.creator_is_authority == true"
  excluded_fields: []
  excluded_zones:
    - "agent_reasoning_context"
    - "placeholder"
