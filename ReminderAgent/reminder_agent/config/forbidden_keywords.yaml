# Forbidden Keywords — per-task visual/domain keywords.
# Used to enforce AF_low compliance: AF_low conditions must not leak these cues.
#
# visual_keywords: appearance cues (colour, shape, distinguishing features)
# domain_keywords: specific properties

example_book:
  visual_keywords:
    - "red"
    - "mountain"
    - "landscape"
    - "cover"
  domain_keywords:
    - "erta ale"
    - "paperback"

example_hanger:
  visual_keywords:
    - "wood"
    - "wide"
    - "curved"
  domain_keywords:
    - "wide"
