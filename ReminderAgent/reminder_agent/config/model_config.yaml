# Model Configuration — LLM backend selection and parameters
# Switch backends by changing 'backend' and 'model_name'. No code changes needed.

backend: "ollama"                                      # options: together | ollama | openai | anthropic
model_name: "llama3:latest"                            # model identifier for the selected backend
temperature: 0.8
max_tokens: 150
base_url: "http://localhost:11434"                     # base URL for local backends (ollama)
api_key_env: null                                      # environment variable holding the API key (null for local)
